<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyMate | Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ───────── RESET & VARIABLES ───────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;
  --surface:rgba(22,27,39,0.78);
  --surface2:rgba(29,37,53,0.78);
  --border:#252d3f;
  --green:#3bdc8c;
  --green-dim:#2ab872;
  --blue:#5b9af5;
  --blue-dim:#4a82dc;
  --text:#e8edf5;
  --muted:#7a8599;
  --radius:14px;
}
body{
  font-family:'DM Sans',sans-serif; background-color:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column;
  background-image: 
    radial-gradient(circle at 15% 50%, rgba(59,220,140,0.06), transparent 30%),
    radial-gradient(circle at 85% 30%, rgba(91,154,245,0.06), transparent 30%);
}

/* ───────── NAV ───────── */
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 40px; background:rgba(14,17,23,.85); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:var(--green); letter-spacing:-0.5px; text-decoration:none;}
.logo span { color:var(--text) }

/* ───────── AUTH LAYOUT ───────── */
.auth-container { flex:1; display:flex; align-items:center; justify-content:center; padding: 40px 20px; z-index:1; position:relative;}
.auth-card {
  background:var(--surface); backdrop-filter:blur(12px); border:1px solid var(--border);
  border-radius:var(--radius); padding:40px; width:100%; max-width:420px;
  box-shadow: 0 8px 32px rgba(0,0,0,.45);
  animation: fadeUp .4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-title { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:700; text-align:center; margin-bottom:24px; color:var(--text); }
.form-group { margin-bottom: 20px; }
.form-group label { display:block; margin-bottom: 8px; font-size:0.9rem; color:var(--muted); font-weight:500;}
.form-control {
  width: 100%; padding: 14px 16px; background:var(--surface2); border:1px solid var(--border);
  border-radius: 10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem;
  outline: none; transition: all .2s;
}
.form-control:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(59,220,140,.15); }

/* ───────── BUTTONS ───────── */
.btn {
  width: 100%; padding: 14px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600;
  border:none; border-radius:10px; cursor:pointer; transition:all .2s; margin-top: 10px;
}
.btn-primary { background:var(--green); color:#0e1117; }
.btn-primary:hover { background:var(--green-dim); transform:translateY(-2px); box-shadow: 0 4px 14px rgba(59,220,140,.3); }

.auth-links { text-align:center; margin-top: 24px; font-size:0.9rem; color:var(--muted); }
.auth-links a { color:var(--blue); text-decoration:none; font-weight:500; transition:color .2s; }
.auth-links a:hover { color:var(--blue-dim); text-decoration:underline; }

/* Subtle grid overlay from original index */
body::before{
  content:''; position:fixed; inset:-48px 0 0 0;
  background-image: linear-gradient(rgba(59,220,140,.04) 1px,transparent 1px), linear-gradient(90deg,rgba(59,220,140,.04) 1px,transparent 1px);
  background-size:48px 48px; pointer-events:none; z-index:0;
  animation: panGrid 20s linear infinite;
  mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
  -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
}
@keyframes panGrid { 0% { transform: translateY(0); } 100% { transform: translateY(48px); } }
</style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Study<span>Mate</span></a>
  </nav>
  
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-title">Create an Account</h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="example@domain.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign Up</button>
        <p id="errorMsg" style="color:var(--red); font-size:0.85rem; margin-top:10px; display:none;"></p>
        <p id="successMsg" style="color:var(--green); font-size:0.85rem; margin-top:10px; display:none;">Registration successful! Redirecting...</p>
      </form>
      <div class="auth-links">
        Already have an account? <a href="/login">Log In</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://studymate-f2bw.onrender.com";

    // Redirect if already logged in via token
    if (localStorage.getItem("sm_auth_token")) {
      window.location.href = "app.html";
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      
      btn.disabled = true;
      btn.innerText = "Signing up...";
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        const res = await fetch(`${API_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, name })
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Registration failed. Try again.");
        }

        successMsg.style.display = 'block';
        btn.innerText = "Redirecting...";
        setTimeout(() => { window.location.href = "index.html"; }, 1500);

      } catch (err) {
        errorMsg.innerText = err.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.innerText = "Sign Up";
      }
    });
  </script>
</body>
</html>
